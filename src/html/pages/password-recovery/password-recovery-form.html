<div class="sign-in__form-wrap">
    <div class="sign-in__form-header">
        <h3 class="sign-in__form-title">Войти в личный кабинет</h3>
    </div>
    <form class="sign-in__form">
        <label>
            <input type="email" name="email" class="sign-in__form-input form__input" placeholder="Email" required>
        </label>
        <label>
            <input type="password" name="password" class="sign-in__form-input form__input" placeholder="Пароль"
                required>
        </label>
        <a href="/pages/password/index.html" class="sign-in__form-link form__link">Забыли пароль?</a>
        <button type="submit" class="sign-in__form-button main-btn">Войти</button>
        <a href="/pages/sign-up/index.html" class="sign-in__form-link form__link">Регистрация</a>
    </form>
</div>
