<div class="password-recovery__form-wrap">
    <div class="password-recovery__form-header">
        <h3 class="password-recovery__form-title form__title">Восстановление пароля</h3>
        <div class="password-recovery__form-header-message">
            <h4 class="password-recovery__form-header-title">
                <svg>
                    <use href="#icon-locked"></use>
                </svg>
                Забыли пароль?
            </h4>

            <span class="password-recovery__form-header-desc">
                Введите Email Вашего аккаунта, Вам будет выслана
                ссылка для восстановления пароля.
            </span>
        </div>
        <form class="password-recovery__form-email form">
            <div class="password-recovery__form-group">
                <label>
                    <input type="email" name="email" class="password-recovery__form-input form__input"
                        placeholder="Email" id="email" required>
                </label>
            </div>
            <button type="submit" class="password-recovery__form-button main-btn">Отправить ссылку</button>
        </form>
    </div>


    <div class="password-recovery__form-header">
        <div class="password-recovery__form-header-message">
            <h4 class="password-recovery__form-header-title">
                <svg>
                    <use href="#icon-locked"></use>
                </svg>
                Восстановление пароля
            </h4>
            <span class="password-recovery__form-header-desc">
                Введите новый пароль для Email example@gmail.com
            </span>
        </div>
        <form class="password-recovery__form-password form">
            <div class="password-recovery__form-group">
                <label>
                    <input type="password" name="password" class="password-recovery__form-input form__input"
                        placeholder="Новый пароль*" id="password" required>
                </label>
            </div>
            <div class="password-recovery__form-group">
                <label>
                    <input type="password" name="new-password" class="password-recovery__form-input form__input"
                        placeholder="Подтвердите новый пароль*" id="confirm-password" required>
                </label>
            </div>
            <button type="submit" class="password-recovery__form-button main-btn">Сменить пароль</button>
        </form>
    </div>
</div>
