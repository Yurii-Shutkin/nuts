<div class="sign-in__form-wrap">
    <div class="sign-in__form-header">
        <h3 class="sign-in__form-title">Войти в личный кабинет</h3>
    </div>
    <form class="sign-in__form">
        <div class="sign-in__form-group">
            <label>
                <input type="email" name="email" class="sign-in__form-input form__input" placeholder="Email" id="email"
                    required>
            </label>
        </div>
        <div class="sign-in__form-group">
            <label>
                <input type="password" name="password" class="sign-in__form-input form__input" placeholder="Пароль"
                    id="password" required>
            </label>
        </div>
        <a href="{{baseUrl 'pages/password-recovery/index.html'}}" class="sign-in__form-link">Забыли пароль?</a>
        <button type="submit" class="sign-in__form-button main-btn">Войти</button>
        <a href="{{baseUrl 'pages/sign-up/index.html'}}" class="sign-in__form-link">Регистрация</a>
    </form>
</div>
