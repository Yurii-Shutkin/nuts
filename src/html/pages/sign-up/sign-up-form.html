<div class="sign-up__form-wrap">
    <div class="sign-up__form-header">
        <h3 class="sign-up__form-title">Регистрация</h3>
    </div>
    <form class="sign-up__form">
        <div class="sign-up__form-body">
            <div class="sign-up__form-leftside">
                <div class="sign-up__form-blocks">
                    <div class="sign-up__form-block">
                        <h4 class="sign-up__form-subtitle">1. Контактные данные</h4>
                        <div class="sign-up__form-leftside-head">
                            <button type="button" class="sign-up__form-leftside-head-btn">Физическое лицо</button>
                            <button type="button" class="sign-up__form-leftside-head-btn">Юридическое лицо</button>
                        </div>
                        <div class="sign-up__form-group">
                            <input type="text" id="name" name="name" aria-label="ФИО"
                                class="sign-up__form-input form__input" placeholder="ФИО*" required>
                        </div>
                        <div class="sign-up__form-group">
                            <input type="email" id="email" name="email" aria-label="Email"
                                class="sign-up__form-input form__input" placeholder="Email*" required>
                        </div>
                        <div class="sign-up__form-group">
                            <input type="tel" aria-label="Телефон" id="tel" name="tel"
                                class="sign-up__form-input form__input" placeholder="Телефон*" required>
                        </div>
                    </div>
                    <div class="sign-up__form-block">
                        <h4 class="sign-up__form-subtitle">2. Адрес</h4>
                        <div class="sign-up__form-group">
                            <input type="text" id="country" name="country" aria-label="Страна"
                                class="sign-up__form-input form__input" placeholder="Страна" required>
                        </div>
                        <div class="sign-up__form-group">
                            <input type="text" id="region" name="region" aria-label="Область"
                                class="sign-up__form-input form__input" placeholder="Область" required>
                        </div>
                        <div class="sign-up__form-group">
                            <input type="text" id="city" name="city" aria-label="Город"
                                class="sign-up__form-input form__input" placeholder="Город*" required>
                        </div>
                        <div class="sign-up__form-group">
                            <input type="text" id="adress" name="adress" aria-label="Адрес"
                                class="sign-up__form-input form__input" placeholder="Адрес*" required>
                        </div>
                    </div>
                    <div class="sign-up__form-block">
                        <h4 class="sign-up__form-subtitle">3. Пароль</h4>
                        <div class="sign-up__form-group">
                            <input type="password" id="password" name="password" aria-label="Пароль"
                                class="sign-up__form-input form__input" placeholder="Пароль*" required>
                        </div>
                        <div class="sign-up__form-group">
                            <input type="password" id="confirm-password" name="confirm-password"
                                aria-label="Подтверждение пароля" class="sign-up__form-input form__input"
                                placeholder="Подтвердите пароля*" required>
                        </div>
                    </div>
                </div>
                <div class="sign-up__form-checkbox">
                    <label class="form__checkbox-label">
                        <input type="checkbox" name="agreement" id="agreement"
                            class="sign-up__form-checkbox-input form__checkbox-input">
                        <span class="form__checkbox-box"></span>
                        <span class="sign-up__checkbox-text form__checkbox-text">
                            Я согласен с <a href="#" class="sign-up__form-checkbox-link form__checkbox-link">Условиями
                                регистрации</a>
                        </span>
                    </label>
                </div>
                <button type="submit" class="sign-up__form-button main-btn">Продолжить</button>

            </div>
            <div class="sign-up__form-rightside">
                <div class="profile-upload">
                    <label class="avatar-loader">
                        <input type="file" accept="image/*" class="hidden-input" id="file">
                        <picture>
                            <img src="/img/input-file-bg.png" alt="input-file-bg">
                        </picture>
                        <div class="avatar-placeholder">
                            <span class="upload-text">Загрузить фото</span>
                        </div>
                    </label>

                    <label class="sign-up__form-checkbox form__checkbox-label fop-checkbox">
                        <input type="checkbox" class="form__checkbox-input" name="fop">
                        <span class="form__checkbox-box"></span>
                        <span class="form__checkbox-text">Являюсь ФОП</span>
                    </label>
                </div>
            </div>
        </div>
    </form>
</div>
