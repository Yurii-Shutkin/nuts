<div class="container">
    <div class="catalog__filter-wrap">
        <div class="catalog__filter-label">
            Фильтр
            <div class="catalog__filter-icon">
                <svg>
                    <use href="#icon-settings"></use>
                </svg>
            </div>
        </div>
        <div class="form__multiselect catalog__filter-multiselect catalog__filter-multiselect--taste" id="multisilect">
            <div class="form__multiselect-wrapper">
                <button type="button" class="form__multiselect-control">
                    <span class="form__multiselect-value">
                        Вкус
                    </span>
                    <div class="form__multiselect-arrow">
                        <svg>
                            <use href="#icon-select-arrow"></use>
                        </svg>
                    </div>
                </button>
                <div class="form__multiselect-dropdown">
                    <label class="form__multiselect-option">
                        <input class="form__multiselect-option-checkbox" type="checkbox" value="sweet"
                            id="taste-sweet">
                        <span class="form__multiselect-option-value">
                            Сладкий
                        </span>
                        <div class="form__multiselect-option-box"></div>
                        <svg class="form__multiselect-option-checkmark">
                            <use href="#icon-checkmark"></use>
                        </svg>
                    </label>
                    <label class="form__multiselect-option">
                        <input class="form__multiselect-option-checkbox" type="checkbox" value="confectionery"
                            id="taste-confectionery">
                        <span class="form__multiselect-option-value">Кондитерский</span>
                        <div class="form__multiselect-option-box"></div>
                        <svg class="form__multiselect-option-checkmark">
                            <use href="#icon-checkmark"></use>
                        </svg>
                    </label>
                    <label class="form__multiselect-option">
                        <input class="form__multiselect-option-checkbox" type="checkbox" value="purified"
                            id="taste-purified">
                        <span class="form__multiselect-option-value">Очищённый</span>
                        <div class="form__multiselect-option-box"></div>
                        <svg class="form__multiselect-option-checkmark">
                            <use href="#icon-checkmark"></use>
                        </svg>
                    </label>
                    <label class="form__multiselect-option">
                        <input class="form__multiselect-option-checkbox" type="checkbox" value="honey"
                            id="taste-honey">
                        <span class="form__multiselect-option-value">Медовый</span>
                        <div class="form__multiselect-option-box"></div>
                        <svg class="form__multiselect-option-checkmark">
                            <use href="#icon-checkmark"></use>
                        </svg>
                    </label>
                </div>
            </div>
        </div>
        <div class="form__multiselect catalog__filter-multiselect catalog__filter-multiselect--weight" id="multisilect">
            <div class="form__multiselect-wrapper">
                <button type="button" class="form__multiselect-control">
                    <span class="form__multiselect-value">
                        Масса
                    </span>
                    <div class="form__multiselect-arrow">
                        <svg>
                            <use href="#icon-select-arrow"></use>
                        </svg>
                    </div>
                </button>
                <div class="form__multiselect-dropdown">
                    <label class="form__multiselect-option">
                        <input class="form__multiselect-option-checkbox" type="checkbox" value="40" id="weight-40">
                        <span class="form__multiselect-option-value">
                            40 г.
                        </span>
                        <div class="form__multiselect-option-box"></div>
                        <svg class="form__multiselect-option-checkmark">
                            <use href="#icon-checkmark"></use>
                        </svg>
                    </label>
                    <label class="form__multiselect-option">
                        <input class="form__multiselect-option-checkbox" type="checkbox" value="80" id="weight-80">
                        <span class="form__multiselect-option-value">80 г.</span>
                        <div class="form__multiselect-option-box"></div>
                        <svg class="form__multiselect-option-checkmark">
                            <use href="#icon-checkmark"></use>
                        </svg>
                    </label>
                    <label class="form__multiselect-option">
                        <input class="form__multiselect-option-checkbox" type="checkbox" value="100" id="weight-100">
                        <span class="form__multiselect-option-value">100 г.</span>
                        <div class="form__multiselect-option-box"></div>
                        <svg class="form__multiselect-option-checkmark">
                            <use href="#icon-checkmark"></use>
                        </svg>
                    </label>
                    <label class="form__multiselect-option">
                        <input class="form__multiselect-option-checkbox" type="checkbox" value="180" id="weight-180">
                        <span class="form__multiselect-option-value">180 г.</span>
                        <div class="form__multiselect-option-box"></div>
                        <svg class="form__multiselect-option-checkmark">
                            <use href="#icon-checkmark"></use>
                        </svg>
                    </label>
                </div>
            </div>
        </div>
        <div class="catalog__filter-label catalog__filter-label--price">
            Стоимость
            <div class="catalog__filter-icon">
                <svg data-price-sort="asc">
                    <use href="#icon-arrow-down"></use>
                </svg>
                <svg data-price-sort="desc">
                    <use href="#icon-arrow-up"></use>
                </svg>
            </div>
        </div>
        <button type="button" class="catalog__filter-btn-accept main-btn">Применить</button>
        <div class="catalog__filter-reset-btn-wrap">
            <div class="catalog__filter-icon">
                <svg>
                    <use href="#icon-close-button-2"></use>
                </svg>
            </div>
            <button type="button" class="catalog__filter-reset-btn">Сбросить</button>
        </div>
    </div>
</div>
