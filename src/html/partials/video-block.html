<div class="video-block__wrap">
    <div class="video-block__overlay"></div>
    <div class="video-block__img">
        <picture>
            <img src="/img/main/video-block-preview.png" alt="overlay">
        </picture>
    </div>
    <div class="video-block__content">
        <h2 class="video-block__title">
            Наша главная цель - получить максимальную прибыль с одного гектара
        </h2>
        <div class="video-block__play-icon">
            {{> partials/play-icon }}
        </div>
        <button type="button">Cмотреть видео о производстве</button>
    </div>
    <div class="video-block__video-wrap">
        <video class="video-block__video" src="/video/walnut-hazelnut.mp4" controls></video>
    </div>
</div>
