<div class="hero__banner-wrap">
    <div class="container">
        {{#if breadcrumbs}}
        {{> partials/breadcrumbs }}
        {{/if}}
    </div>

    <picture class="hero__banner">
        <img src={{ imgsrc }} alt="banner">
    </picture>

    <div class="hero__overlay"></div>
    <div class="hero__content">
        <h1 class="hero__title">
            {{ title }}
        </h1>
        <span class="hero__desc">
            {{ desc }}
        </span>
        <button type="button" class="hero__btn-play">
            {{> partials/play-icon }}
        </button>
    </div>
    {{#if video}}
    <div class="hero__video-wrap">
        <video class="hero__video" src="/video/walnut-small-o.mp4" controls></video>
    </div>
    {{/if}}
</div>
