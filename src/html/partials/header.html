<header class="header">
    <div class="head">
        <div class="container">
            <div class="head__wrapper">
                <div class="head__call-request">
                    <svg>
                        <use href="#icon-phone">
                        </use>
                    </svg>
                    <a href="tel:'+380447505011'" class="header__tel-number">
                        <span>
                            +38 (044)
                        </span>
                        750-50-11
                    </a>
                    <button type="button" class="inline-btn head__call-request-btn">
                        Заказать звонок
                    </button>
                </div>
                <div class="socials">
                    <a href="" class="head__socials-link">
                        <svg class="icon-social icon">
                            <use href="#icon-facebook"></use>
                        </svg>
                    </a>
                    <a href="" class="head__socials-link">
                        <svg class="icon-social icon">
                            <use href="#icon-instagram"></use>
                        </svg>
                    </a>
                    <a href="" class="head__socials-link">
                        <svg class="icon-social icon">
                            <use href="#icon-youtube"></use>
                        </svg>
                    </a>
                </div>
                <div class="head__message">
                    <a href="#">Ваша персональная скидка - 5%</a>
                </div>
                <div class="user-coner">
                    <div class="auth">
                        <button type="button" class="auth__btn">
                            <div class="auth__user-icon">
                                <svg class="icon">
                                    <use href="#icon-user"></use>
                                </svg>
                            </div>
                            Вход
                        </button>
                        <button type="button" class="auth__btn">Регистрация</button>
                    </div>
                    <div class="lang select">
                        <div class="select__wrapper">
                            <button type="button" class="select__control">
                                <span class="select__value">Ru</span>
                                <svg class="select__arrow icon">
                                    <use href="#icon-select-arrow"></use>
                                </svg>
                            </button>
                            <div class="select__dropdown">
                                <button type="button" class="select__option">
                                    En
                                </button>
                                <button type="button" class="select__option">
                                    Ua
                                </button>
                                <button type="button" class="select__option">
                                    Ru
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="header__grid-wrap">
        <div class="container">
            <div class="header__grid">
                {{> partials/burger }}
                <div class="header__logo logo">
                    {{> partials/logo }}
                </div>
                <div class="header__center">
                    <div class="header__social">
                        <a class="header__social-icon">
                            <svg>
                                <use href="#icon-viber"></use>
                            </svg>
                        </a>
                        <a class="header__social-icon">
                            <svg>
                                <use href="#icon-telegram"></use>
                            </svg>
                        </a>
                        <a class="header__social-icon">
                            <svg>
                                <use href="#icon-whatsapp"></use>
                            </svg>
                        </a>
                    </div>
                    <div class="header__tel-block">
                        <a href="tel:'+380447505011'" class="header__tel-number">
                            <span>
                                +38 (044)
                            </span>
                            750-50-11
                        </a>
                        <a href="tel:'+380977755051'" class="header__tel-number">
                            <span>
                                +38 (097)
                            </span>
                            775-50-51
                        </a>
                    </div>
                    <div class="header__call-request">
                        <button type="button" class="main-btn header__call-request-btn">
                            Заказать звонок
                        </button>
                        <span class="header__call-request-msg">
                            Ждем Вашего звонка ежедневно с 9 до 18
                        </span>
                    </div>
                </div>
                <div class="header__cart">
                    <a class="header__cart-icon">
                        <svg>
                            <use href="#icon-cart">
                            </use>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <div class="head__message head__message--mb">
        <a href="#">Ваша персональная скидка - 5%</a>
    </div>
    <div class="container">
        {{> partials/nav }}
    </div>
    {{> partials/sidebar }}
</header>
